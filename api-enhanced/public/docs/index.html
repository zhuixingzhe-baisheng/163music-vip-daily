    .theme-toggle {
      position: fixed;

      -webkit-backdrop-filter: blur(12px);

      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      outline: none;
      padding: 0;
      line-height: 1;
      user-select: none;
    }
    .theme-toggle:hover {
      transform: scale(1.12) rotate(12deg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .theme-toggle:active {
      transform: scale(0.92);
    }
    .theme-toggle.light {
      background: rgba(255,255,255,0.85);
      color: #333;
      border-color: rgba(0,0,0,0.08);
    }

<body>
  <div id="app"></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
</body>
<script>
  (function() {
    var STORAGE_KEY = 'docsify-theme';
    var link = document.getElementById('theme-css');
    var btn = document.getElementById('themeToggle');
    var LIGHT_URL = '//unpkg.com/docsify/lib/themes/vue.css';
    var DARK_URL = '//unpkg.com/docsify/lib/themes/dark.css';

    function setTheme(theme) {
      link.href = theme === 'dark' ? DARK_URL : LIGHT_URL;
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      btn.className = 'theme-toggle' + (theme === 'dark' ? '' : ' light');
      localStorage.setItem(STORAGE_KEY, theme);
    }

    function toggleTheme() {
      var isDark = link.href.includes('dark');
      setTheme(isDark ? 'light' : 'dark');
    }

    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      setTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    }

    btn.addEventListener('click', toggleTheme);

    try {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    } catch(e) {}
  })();
</script>
